version: '3.8'

services:
  web:
    build: .
    ports:
      - "5001:5000"
    volumes:
      - ./data/highscores.json:/app/highscores.json
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
    # Using Gunicorn with threads to support SocketIO without eventlet (Python 3.13 compatibility)
    command: gunicorn --bind 0.0.0.0:5000 --workers 1 --threads 100 app:app
    restart: unless-stopped
