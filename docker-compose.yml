version: '3.8'

services:
  web:
    build: .
    ports:
      - "5001:5000"
    volumes:
      - ./data/highscores.json:/app/highscores.json
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
    # Using 1 worker with eventlet class for SocketIO/Multiplayer support
    command: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:5000 app:app
    restart: unless-stopped
