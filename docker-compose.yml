version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mathuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mathpassword}
      POSTGRES_DB: ${POSTGRES_DB:-mathpuzzle}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathuser -d mathpuzzle"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "5001:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mathuser}:${POSTGRES_PASSWORD:-mathpassword}@db:5432/${POSTGRES_DB:-mathpuzzle}
    depends_on:
      db:
        condition: service_healthy
    command: >
      gunicorn 
      --bind 0.0.0.0:5000 
      --workers 1 
      --threads 100 
      --certfile=cert.pem 
      --keyfile=key.pem 
      app:app
    restart: unless-stopped

volumes:
  postgres_data:
