<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Game - Play</title>
    <style>
        body { font-family: sans-serif; text-align: center; }
        .game-info { margin-bottom: 20px; }
        .question { font-size: 1.5em; margin-bottom: 20px; }
        form { display: inline-block; }
        input, button { margin: 5px; padding: 5px; }
        .choice-btn {
            display: block;
            width: 200px;
            margin: 10px auto;
            padding: 10px;
            font-size: 1.1em;
            cursor: pointer;
        }
    </style>
    <script>
        // Simple client-side timer display (only for time mode)
        window.onload = function() {
            const mode = "{{ mode }}";
            if (mode !== 'time') return;

            let timeLeft = parseInt(document.getElementById('time-left').innerText);
            const timerDisplay = document.getElementById('time-left');

            const interval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                }
            }, 1000);
        };
    </script>
</head>
<body>
    <h1>Math Game</h1>
    <div class="game-info">
        <p>Score: {{ score }} |
        {% if mode == 'time' %}
            Time Left: <span id="time-left">{{ time_left }}</span> seconds
        {% else %}
            Questions Left: {{ questions_left }}
        {% endif %}
        </p>
    </div>
    <div class="question">
        <p>{{ question }}</p>
    </div>
    <form id="answer-form" action="{{ url_for('submit_answer') }}" method="post">
        {% if choices %}
            <div class="choices">
                {% for choice in choices %}
                    <button type="submit" name="answer" value="{{ choice }}" class="choice-btn">{{ choice }}</button>
                {% endfor %}
            </div>
        {% else %}
            <input type="number" name="answer" placeholder="Your answer" step="any" required autofocus>
            <button type="submit">Submit</button>
        {% endif %}
    </form>
    <p><a href="{{ url_for('game_over') }}">End Game</a></p>
</body>
</html>
