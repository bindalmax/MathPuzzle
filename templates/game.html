<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Game - Play</title>
    <style>
        body { font-family: sans-serif; text-align: center; }
        .game-info { margin-bottom: 20px; }
        .question { font-size: 1.5em; margin-bottom: 20px; }
        form { display: inline-block; }
        input, button { margin: 5px; padding: 5px; }
    </style>
    <script>
        // Simple client-side timer display (optional, but good for UX)
        window.onload = function() {
            let timeLeft = parseInt(document.getElementById('time-left').innerText);
            const timerDisplay = document.getElementById('time-left');

            const interval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    // Optionally submit the form or redirect when time is up
                    // document.getElementById('answer-form').submit();
                }
            }, 1000);
        };
    </script>
</head>
<body>
    <h1>Math Game</h1>
    <div class="game-info">
        <p>Score: {{ score }} | Time Left: <span id="time-left">{{ time_left }}</span> seconds</p>
    </div>
    <div class="question">
        <p>{{ question }}</p>
    </div>
    <form id="answer-form" action="{{ url_for('submit_answer') }}" method="post">
        <input type="number" name="answer" placeholder="Your answer" required autofocus>
        <button type="submit">Submit</button>
    </form>
    <p><a href="{{ url_for('game_over') }}">End Game</a></p>
</body>
</html>
