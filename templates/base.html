<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MathPuzzle{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --secondary-color: #27ae60;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --error-color: #e74c3c;
            --chalkboard-green: #1e3d2b;
            --paper-grid: #e1e8ed;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Lexend', sans-serif;
            line-height: 1.6;
            text-align: center;
            background-color: var(--bg-color);
            background-image:
                linear-gradient(var(--paper-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--paper-grid) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            min-height: 100vh;
        }
        .main-container {
            width: 100%;
            max-width: 1000px;
            margin: 20px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 2px solid var(--primary-color);
            position: relative;
            overflow: hidden;
        }
        /* Decorative Math Symbols */
        .math-decor {
            position: absolute;
            font-size: 4rem;
            color: rgba(44, 62, 80, 0.08); /* Increased opacity from 0.03 to 0.08 */
            pointer-events: none;
            z-index: 0;
            font-family: 'Fira Code', monospace;
            white-space: nowrap;
        }
        .decor-1 { top: -10px; left: -10px; transform: rotate(-15deg); }
        .decor-2 { bottom: -10px; right: -10px; transform: rotate(15deg); }
        .decor-3 { top: 20%; right: -20px; transform: rotate(45deg); font-size: 3rem; }
        .decor-4 { bottom: 30%; left: -30px; transform: rotate(-30deg); font-size: 5rem; }
        .decor-5 { top: 50%; right: 10%; transform: rotate(10deg); font-size: 2.5rem; opacity: 0.05; }

        h1, h2, h3 {
            color: var(--primary-color);
            font-weight: 700;
            margin-top: 0;
        }

        button, input, select {
            min-height: 48px;
            font-size: 16px;
            padding: 12px 20px;
            border-radius: 8px;
            border: 2px solid #ddd;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        button {
            cursor: pointer;
            background: var(--accent-color);
            color: white;
            border: none;
            font-weight: 700;
            box-shadow: 0 4px 0 #2980b9;
        }
        button:hover {
            background: #2980b9;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2980b9;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .error { color: var(--error-color); font-weight: bold; }

        {% block extra_style %}{% endblock %}
    </style>
    {% block scripts %}{% endblock %}
</head>
<body>
    <div class="main-container">
        <!-- Increased quantity of math decorations -->
        <div class="math-decor decor-1">∫ π Σ</div>
        <div class="math-decor decor-2">√ x² ∞</div>
        <div class="math-decor decor-3">λ φ Δ</div>
        <div class="math-decor decor-4">f(x) sin θ</div>
        <div class="math-decor decor-5">e = mc²</div>

        <div style="position:relative; z-index: 1;">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
