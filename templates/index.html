<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Game</title>
    <style>
        body { font-family: sans-serif; text-align: center; }
        form { display: inline-block; text-align: left; }
        select, input, button { margin: 5px; padding: 5px; }
    </style>
    <script>
        function toggleModeInput() {
            const modeSelect = document.getElementById('mode');
            const modeLabel = document.getElementById('mode_label');
            const modeValue = document.getElementById('mode_value');

            if (modeSelect.value === 'time') {
                modeLabel.textContent = 'Time in seconds (5-300):';
                modeValue.min = 5;
                modeValue.max = 300;
                modeValue.value = 20;
            } else {
                modeLabel.textContent = 'Number of questions (1-100):';
                modeValue.min = 1;
                modeValue.max = 100;
                modeValue.value = 10;
            }
        }
    </script>
</head>
<body>
    <h1>Welcome to the Math Game!</h1>
    <form method="post">
        <label for="player_name">Enter your name:</label><br>
        <input type="text" id="player_name" name="player_name" required><br><br>

        <label for="category">Choose a category:</label><br>
        <select id="category" name="category">
            <option value="basic">Basic Arithmetic</option>
            <option value="decimal">Decimals and Fractions</option>
            <option value="percentage">Percentages</option>
            <option value="profit_loss">Profit and Loss</option>
            <option value="algebra">Algebra</option>
        </select><br><br>

        <label for="difficulty">Choose a difficulty:</label><br>
        <select id="difficulty" name="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select><br><br>

        <label for="mode">Choose game mode:</label><br>
        <select id="mode" name="mode" onchange="toggleModeInput()">
            <option value="time">Time Mode (answer as many as you can)</option>
            <option value="questions">Question Count Mode (answer exactly X questions)</option>
        </select><br><br>

        <label for="mode_value" id="mode_label">Time in seconds (5-300):</label><br>
        <input type="number" id="mode_value" name="mode_value" min="5" max="300" value="20" required><br><br>

        <button type="submit">Start Game</button>
    </form>
    <br>
    <a href="{{ url_for('leaderboard') }}">View Leaderboard</a>
</body>
</html>
