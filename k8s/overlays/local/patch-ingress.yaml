apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mathpuzzle-ingress
  annotations:
    cert-manager.io/issuer: "selfsigned-issuer"
spec:
  tls:
  - hosts:
    - 127.0.0.1.sslip.io
    secretName: mathpuzzle-local-tls
  rules:
  - host: 127.0.0.1.sslip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mathpuzzle-service
            port:
              number: 80
