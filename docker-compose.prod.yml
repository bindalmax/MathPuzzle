version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    # Cloud-optimized Gunicorn command (no local SSL certs, as proxy handles it)
    command: gunicorn --bind 0.0.0.0:5000 --workers 1 --threads 100 app:app
    restart: always
